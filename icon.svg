<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f5efe6" rx="200"/>
  
  <!-- House body -->
  <rect x="120" y="210" width="160" height="120" fill="#5c4a3a" rx="4"/>
  
  <!-- Roof -->
  <polygon points="200,100 90,220 310,220" fill="#8b6f5e"/>
  
  <!-- Door -->
  <rect x="170" y="270" width="50" height="60" fill="#f5efe6" rx="4"/>
  <circle cx="213" cy="302" r="4" fill="#5c4a3a"/>
  
  <!-- Left window -->
  <rect x="130" y="230" width="36" height="30" fill="#ddd0c4" rx="3"/>
  <line x1="148" y1="230" x2="148" y2="260" stroke="#5c4a3a" stroke-width="2"/>
  <line x1="130" y1="245" x2="166" y2="245" stroke="#5c4a3a" stroke-width="2"/>
  
  <!-- Right window -->
  <rect x="234" y="230" width="36" height="30" fill="#ddd0c4" rx="3"/>
  <line x1="252" y1="230" x2="252" y2="260" stroke="#5c4a3a" stroke-width="2"/>
  <line x1="234" y1="245" x2="270" y2="245" stroke="#5c4a3a" stroke-width="2"/>
  
  <!-- Chimney -->
  <rect x="240" y="120" width="22" height="60" fill="#8b6f5e"/>
  
  <!-- Small plants -->
  <rect x="108" y="318" width="12" height="12" fill="#7a9e6e" rx="2"/>
  <rect x="280" y="318" width="12" height="12" fill="#7a9e6e" rx="2"/>
</svg>
